<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Cún Iuuu ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        
        body {
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            height: 100vh; margin: 0; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Quicksand', sans-serif; padding: 20px;
        }

        h1 { color: #d63384; margin-top: 20px; font-size: 1.5rem; text-align: center; opacity: 0; animation: fadeIn 1s 0.5s forwards; }

        .stage {
            display: flex; justify-content: center; align-items: flex-end;
            gap: 20px; margin-top: auto; margin-bottom: auto;
            position: relative; width: 100%; height: 250px;
        }

        /* VẬT THỂ */
        .bouquet { font-size: 80px; opacity: 0; animation: fadeInRise 1s 1.2s forwards; }
        .cake { font-size: 110px; opacity: 0; animation: fadeIn 1s 1s forwards; }

        .envelope-container {
            width: 80px; height: 80px; position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        .envelope {
            font-size: 65px; cursor: pointer; position: absolute;
            top: -100vh; opacity: 0; z-index: 50;
            animation: dropFinal 1.2s 2.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, 
                       hintShake 1.5s infinite 3.5s;
        }

        /* MŨI TÊN CHỈ DẪN */
        .guide-box {
            position: absolute; top: -65px; text-align: center;
            opacity: 0; animation: fadeIn 0.5s 4s forwards; pointer-events: none;
        }
        .arrow { font-size: 25px; color: #d63384; animation: bounceArrow 1s infinite; }
        .guide-text { font-size: 12px; font-weight: bold; color: #d63384; background: white; padding: 4px 8px; border-radius: 8px; }

        /* POPUP LỜI CHÚC */
        .letter-popup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90%; max-width: 350px; background: white; padding: 25px;
            border-radius: 20px; border: 2px dashed #ffafbd;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); z-index: 100; transition: 0.5s;
        }
        .letter-popup.show { display: block; transform: translate(-50%, -50%) scale(1); }
        
        /* Hiệu ứng chữ viết tay */
        .letter-text { 
            color: #d63384; line-height: 1.8; font-size: 1.1rem; min-height: 150px;
            text-align: left; white-space: pre-line;
        }
        .letter-text::after { content: '|'; animation: blink 0.7s infinite; }

        .close-btn { 
            background: linear-gradient(to right, #ff4d6d, #d63384);
            color: white; border: none; padding: 12px; border-radius: 30px;
            cursor: pointer; margin-top: 15px; width: 100%; font-weight: bold;
            opacity: 0; transition: opacity 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInRise { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes dropFinal { 0% { top: -100vh; opacity: 0; } 100% { top: 0; opacity: 1; transform: rotate(10deg); } }
        @keyframes hintShake { 0%, 100% { transform: rotate(10deg) scale(1); } 50% { transform: rotate(-5deg) scale(1.1); } }
        @keyframes bounceArrow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes blink { 50% { opacity: 0; } }

        @media (max-width: 600px) {
            .stage { flex-direction: column; align-items: center; height: auto; gap: 10px; }
            .cake { order: 1; } .bouquet { order: 2; font-size: 70px; } .envelope-container { order: 3; }
        }
    </style>
</head>
<body>

    <h1>HAPPY BIRTHDAY CÚN IUUU! ❤️</h1>

    <div class="stage">
        <div class="cake">🎂</div>
        <div class="bouquet">💐</div>
        <div class="envelope-container">
            <div class="guide-box" id="guide">
                <div class="arrow">↓</div>
                <div class="guide-text">Ấn mở thư</div>
            </div>
            <div class="envelope" id="envelope" onclick="openLetter()">✉️</div>
        </div>
    </div>

    <div id="letterPopup" class="letter-popup">
        <div id="typewriter" class="letter-text"></div>
        <button id="closeBtn" class="close-btn" onclick="closeLetter()">Gấp thư lại ❤️</button>
    </div>
<audio id="birthMusic">
    <source src="music/birthday.mp3" type="audio/mpeg">
</audio>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const message = "Gửi Cún luuu ❤️,\n\nChúc mừng sinh nhật người con gái anh thương nhất. Chúc em luôn xinh đẹp, rạng rỡ và đạt được mọi điều mình mong muốn.\n\nDù có chuyện gì xảy ra, hãy nhớ luôn có anh ở bên cạnh ủng hộ em nhé!\n\nYêu em thật nhiều! 👩‍❤️‍👨\n\n-- Anh Tuấn --";
        let i = 0;

        function typeWriter() {
            if (i < message.length) {
                document.getElementById("typewriter").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriter, 50); // Tốc độ viết chữ
            } else {
                document.getElementById("closeBtn").style.opacity = "1";
            }
        }

        function openLetter() {
            document.getElementById('letterPopup').classList.add('show');
            document.getElementById('envelope').style.visibility = "hidden";
            document.getElementById('guide').style.display = "none";
            
            // Phát nhạc ngay khi mở thư
        document.getElementById('birthMusic').play();

            // Bắn pháo hoa
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ffafbd', '#d63384'] });
            
            // Bắt đầu viết chữ
            if(i === 0) typeWriter();
        }

        function closeLetter() {
            document.getElementById('letterPopup').classList.remove('show');
            document.getElementById('envelope').style.visibility = "visible";
            document.getElementById('birthMusic').pause(); // Dừng nhạc khi đóng
        document.getElementById('birthMusic').currentTime = 0; // Reset nhạc
        }
    
    function closeLetter() {
        document.getElementById('letterPopup').classList.remove('show');
        document.getElementById('envelope').style.visibility = "visible";
        document.getElementById('birthMusic').pause(); // Dừng nhạc khi đóng
        document.getElementById('birthMusic').currentTime = 0; // Reset nhạc
    }
    </script>
    
</body>
</html>
