<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Cún Iuuu ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        
        /* FIX TRÀN MÀN HÌNH VÀ CĂN GIỮA TUYỆT ĐỐI */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; position: fixed;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            font-family: 'Quicksand', sans-serif;
        }

        body {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; /* Căn giữa toàn bộ nội dung dọc */
        }

        /* TIÊU ĐỀ KHÔNG BỊ MẤT CHỮ */
        h1 { 
            color: #d63384; 
            font-size: clamp(1.3rem, 6vw, 2.2rem); /* Tự co giãn theo màn hình */
            text-align: center; 
            width: 90%;
            margin: 0 0 30px 0; /* Khoảng cách dưới tiêu đề */
            opacity: 0; 
            animation: fadeIn 1s 0.5s forwards; 
        }

        .stage {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; width: 100%; position: relative;
        }

        /* VẬT THỂ CO GIÃN THEO ĐIỆN THOẠI */
        .bouquet, .cake { 
            font-size: clamp(60px, 18vw, 110px); 
            opacity: 0; 
        }
        .cake { animation: fadeIn 1s 1s forwards; }
        .bouquet { animation: fadeInRise 1s 1.2s forwards; }

        .envelope-container {
            margin-top: 40px; /* Tạo khoảng cách với bánh và hoa */
            display: flex; flex-direction: column; align-items: center;
            position: relative;
        }

        .envelope {
            font-size: 70px; cursor: pointer;
            animation: hintShake 1.5s infinite 3s;
        }

        .guide-box {
            position: absolute; top: -50px; text-align: center;
            opacity: 0; animation: fadeIn 0.5s 3s forwards;
        }
        .arrow { font-size: 20px; color: #d63384; animation: bounceArrow 1s infinite; }
        .guide-text { font-size: 13px; font-weight: bold; color: #d63384; background: white; padding: 4px 10px; border-radius: 10px; }

        /* POPUP LỜI CHÚC - KHÔNG BỊ TRÀN */
        .letter-popup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 85%; max-width: 350px; background: white; padding: 25px;
            border-radius: 20px; border: 2px dashed #ffafbd;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); z-index: 1000;
        }
        .letter-popup.show { display: block; transform: translate(-50%, -50%) scale(1); transition: 0.5s; }
        
        .letter-text { 
            color: #d63384; line-height: 1.6; font-size: 1rem; 
            text-align: left; white-space: pre-line;
        }

        .close-btn { 
            background: #d63384; color: white; border: none; padding: 12px;
            border-radius: 30px; width: 100%; font-weight: bold; margin-top: 15px;
        }

        .btn-end {
            position: fixed; bottom: 30px; background: white; color: #d63384;
            padding: 12px 25px; border-radius: 30px; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); opacity: 0; pointer-events: none;
        }
        .btn-end.show { opacity: 1; pointer-events: auto; animation: pulse 1.5s infinite; }

        /* KEYFRAMES */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInRise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes hintShake { 0%, 100% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(10deg) scale(1.1); } }
        @keyframes bounceArrow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* MOBILE FIX */
        @media (max-width: 600px) {
            h1 { margin-bottom: 20px; }
            .stage { gap: 15px; }
            .envelope-container { margin-top: 20px; }
        }
    </style>
</head>
<body>
    <h1>HAPPY BIRTHDAY CÚN IUUU ❤️</h1>

    <div class="stage">
        <div class="cake">🎂</div>
        <div class="bouquet">💐</div>
    </div>

    <div class="envelope-container">
        <div class="guide-box" id="guide">
            <div class="arrow">↓</div>
            <div class="guide-text">Ấn mở thư</div>
        </div>
        <div id="envelope" class="envelope" onclick="openLetter()">✉️</div>
    </div>

    <div id="letterPopup" class="letter-popup">
        <div id="typewriter" class="letter-text"></div>
        <button id="closeBtn" class="close-btn" onclick="closeLetter()">Gấp thư lại ❤️</button>
    </div>

    <button id="lastBtn" class="btn-end" onclick="window.location.href='the_end.html'">
        Yêu anh thì bấm vào đây ❤️
    </button>

    <audio id="birthMusic" loop>
        <source src="music/birthday.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const message = "Gửi Cún luuu ❤️,\n\nChúc mừng sinh nhật người con gái anh thương nhất. Chúc em luôn xinh đẹp, rạng rỡ và đạt được mọi điều mình mong muốn.\nDù có chuyện gì xảy ra, hãy nhớ luôn có anh ở bên cạnh ủng hộ em nhé\n\nYêu em nhiều lắm 👩‍❤️‍👨\n Út Cún Cún ❤️ \n\n-- Út --";
        let i = 0;

        function typeWriter() {
            if (i < message.length) {
                document.getElementById("typewriter").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            } else {
                document.getElementById("lastBtn").classList.add("show");
            }
        }

        function openLetter() {
            document.getElementById('letterPopup').classList.add('show');
            document.getElementById('envelope').style.visibility = "hidden";
            document.getElementById('guide').style.display = "none";
            const music = document.getElementById('birthMusic');
            if(music) music.play().catch(() => console.log("iPhone chờ chạm để bật nhạc"));
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            if(i === 0) typeWriter();
        }

        function closeLetter() {
            document.getElementById('letterPopup').classList.remove('show');
            document.getElementById('envelope').style.visibility = "visible";
        }
    </script>
</body>
</html>
