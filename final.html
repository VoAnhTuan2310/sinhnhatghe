<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Cún Iuuu ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        
        body {
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            height: 100vh; margin: 0; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Quicksand', sans-serif;
        }

        h1 { color: #d63384; margin-top: 40px; font-size: 1.8rem; opacity: 0; animation: fadeIn 1s 0.5s forwards; }

        /* KHUNG CHỨA Stage: Hoa - Bánh - Thư */
        .stage {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 25px;
            margin-top: 80px;
            height: 200px;
            position: relative;
        }

        /* 1. BÓ HOA */
        .bouquet { font-size: 100px; opacity: 0; animation: fadeInRise 1s 1.2s forwards; line-height: 1; }

        /* 2. BÁNH */
        .cake-box { opacity: 0; animation: fadeIn 1s 1s forwards; line-height: 1; }
        .cake { font-size: 130px; }

        /* 3. LÁ THƯ (Định vị lại hoàn toàn) */
        .envelope-container {
            width: 80px; height: 80px;
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }

        .envelope {
            font-size: 75px; 
            cursor: pointer;
            position: absolute;
            top: -100vh; /* Rơi từ đỉnh màn hình */
            opacity: 0;
            z-index: 50;
            /* Animation rơi và sau đó nhấp nháy */
            animation: dropFinal 1.2s 2.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Hiệu ứng nhấp nháy nhắc click */
        @keyframes hint {
            0%, 100% { transform: rotate(10deg) scale(1); }
            50% { transform: rotate(-10deg) scale(1.1); filter: drop-shadow(0 0 15px white); }
        }
        .envelope.active { animation: dropFinal 1.2s 2.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, hint 1.5s infinite 3.5s; }

        /* 4. LỜI CHÚC */
        .letter-popup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 320px; background: white; padding: 25px;
            border-radius: 20px; border: 2px dashed #ffafbd;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            z-index: 100; transition: 0.5s;
        }
        .letter-popup.show { display: block; transform: translate(-50%, -50%) scale(1); }
        .letter-text { color: #d63384; line-height: 1.6; }
        .close-btn { background: #d63384; color: white; border: none; padding: 10px; border-radius: 20px; cursor: pointer; margin-top: 15px; width: 100%; font-weight: bold; }

        /* ANIMATIONS */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInRise { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes dropFinal { 
            0% { top: -100vh; opacity: 0; }
            100% { top: 0; opacity: 1; transform: rotate(10deg); } 
        }
    </style>
</head>
<body>

    <h1>HAPPY BIRTHDAY CÚN IUUU! ❤️</h1>

    <div class="stage">
        <div class="bouquet">💐</div>
        <div class="cake-box"><div class="cake">🎂</div></div>
        <div class="envelope-container">
            <div class="envelope active" id="envelope" onclick="openLetter()">✉️</div>
        </div>
    </div>

    <div id="letterPopup" class="letter-popup">
        <div class="letter-text">
            <p><strong>Gửi Cún luuu ❤️,</strong></p>
            <p>Chúc mừng sinh nhật em yêu. Chúc em luôn xinh đẹp, rạng rỡ và hạnh phúc bên anh nhé!</p>
            <p>Yêu em thật nhiều! 👩‍❤️‍👨</p>
            <p style="text-align: right;">-- Anh Tuấn --</p>
        </div>
        <button class="close-btn" onclick="closeLetter()">Gấp thư lại ❤️</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<script>
    function openLetter() {
        document.getElementById('letterPopup').classList.add('show');
        document.getElementById('envelope').style.visibility = "hidden";
        
        // Bắn pháo hoa rực rỡ chúc mừng
        const duration = 3 * 1000;
        const end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#ffafbd', '#d63384']
            });
            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#ffafbd', '#d63384']
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    }
</script>
</body>
</html>
