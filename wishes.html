<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Điều ước cho Cún ❤️</title>
    <link rel="stylesheet" href="style_wishes.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Chạm vào ảnh thử êyyy :v</h1>
        
        <div class="wish-scatter">
            <div class="wish-item item-1" onclick="openWish('Chúc bé iu của út luôn xinh đẹp nè 🌸')">
                <img src="img/cun1.jpg" alt="cun1">
            </div>
            <div class="wish-item item-2" onclick="openWish('Chúc em yêu mỗi ngày đều tràn ngập niềm vui nhó ✨')">
                <img src="img/cun21.jpg" alt="cun2">
            </div>
            <div class="wish-item item-3" onclick="openWish('Chúc Cún iuuu đạt được mọi ước mơ nhaaa 💖')">
                <img src="img/cun15.jpg" alt="cun3">
            </div>
            <div class="wish-item item-4" onclick="openWish('Chúc tình yêu của chúng mình mãi bên nhau hẹ hẹ 👩‍❤️‍👨')">
                <img src="img/cun3.jpg" alt="cun4">
            </div>
            <div class="wish-item item-5" onclick="openWish('Chúc mừng sinh nhật em yêu, anh yêu em nhất đời 🎂')">
                <img src="img/cun5.jpg" alt="cun5">
            </div>
        </div>

        <button id="btnFinal" class="btn-final" style="display:none;" onclick="window.location.href='gallery.html'">
    Ngắm nhìn kỷ niệm của chúng mình ❤️
</button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <p id="msg"></p>
            <button class="btn-close" onclick="closeMsg()">Đã nhận ❤️</button>
        </div>
    </div>

    <audio id="wishMusic" loop>
        <source src="music/wishes.mp3" type="audio/mpeg">
    </audio>
    <audio id="openSound">
    <source src="music/ting.mp3" type="audio/mpeg">
</audio>

    <script>
        let opened = 0;

        function openWish(text) {
            // 1. Hiển thị thông điệp
            document.getElementById('msg').innerText = text;
            document.getElementById('modal').style.display = 'flex';

            // 2. Phát nhạc nền ngay cú chạm đầu tiên
            const bgMusic = document.getElementById('wishMusic');
            if (bgMusic && bgMusic.paused) {
                bgMusic.play().catch(e => console.log("Trình duyệt chờ tương tác để phát nhạc"));
            }
            
            // 3. PHÁT TIẾNG "TING" MỞ LỜI CHÚC
        const openSnd = document.getElementById('openSound');
        if (openSnd) {
            openSnd.currentTime = 0; // Reset để bấm nhiều ảnh liên tục vẫn kêu
            openSnd.play().catch(e => console.log("Lỗi âm thanh hiệu ứng"));
        }

            // 3. Hiệu ứng pháo hoa giấy mini khi mở điều ước
            confetti({
                particleCount: 50,
                spread: 60,
                origin: { y: 0.7 },
                colors: ['#ffafbd', '#ffffff', '#d63384']
            });

            // 4. Logic hiện nút quà cuối
            opened++;
            if(opened >= 3) {
                document.getElementById('btnFinal').style.display = 'inline-block';
            }
        }

        function closeMsg() { 
            document.getElementById('modal').style.display = 'none'; 
        }
        function openNotebook(text, index) {
    // Tìm tấm ảnh vừa bấm vào
    const activeItem = document.querySelector(`.item-${index}`);
    if(activeItem) {
        activeItem.style.zIndex = "99999";
        activeItem.classList.add('flip-notebook');
    }
    
    // Đợi 100ms cho ảnh ổn định vị trí giữa rồi mới hiện vở
    setTimeout(() => {
        document.getElementById('notebookContainer').classList.add('show');
        // ... các code hiện vở khác giữ nguyên ...
    }, 100);
}
    </script>
</body>
</html>
