<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điều ước cho Cún ❤️</title>
    <link rel="stylesheet" href="style_wishes.css">
</head>
<body>
    <div class="container">
        <h1>Chạm vào ảnh để xem điều ước nhé! ❤️</h1>
        
        <div class="wish-scatter" id="wishArea">
            <div class="wish-item item-1" onclick="openMsg('Chúc công chúa luôn xinh đẹp rạng ngời! 🌸')">
                <img src="img/cun1.jpg">
            </div>
            <div class="wish-item item-2" onclick="openMsg('Chúc em mỗi ngày đều tràn ngập niềm vui! ✨')">
                <img src="img/cun2.jpg">
            </div>
            <div class="wish-item item-3" onclick="openMsg('Chúc Cún iuuu đạt được mọi ước mơ! 💖')">
                <img src="img/cun3.jpg">
            </div>
            <div class="wish-item item-4" onclick="openMsg('Chúc tình yêu của chúng mình mãi bền lâu! 👩‍❤️‍👨')">
                <img src="img/cun4.jpg">
            </div>
            <div class="wish-item item-5" onclick="openMsg('Chúc mừng sinh nhật, yêu em nhất đời! 🎂')">
                <img src="img/cun5.jpg">
            </div>
        </div>

        <button id="btnFinal" class="btn-final" style="display:none;" onclick="window.location.href='final.html'">
            Món quà cuối cùng ✨
        </button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <p id="msg"></p>
            <button class="btn-close" onclick="closeMsg()">Đã nhận ❤️</button>
        </div>
    </div>

    <script>
        let opened = 0;
        function openMsg(text) {
            document.getElementById('msg').innerText = text;
            document.getElementById('modal').style.display = 'flex';
            opened++;
            // Nếu đã xem đủ 3 lời chúc thì hiện nút quà cuối
            if(opened >= 3) document.getElementById('btnFinal').style.display = 'block';
        }
        function closeMsg() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
