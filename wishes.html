<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Điều ước cho Cún ❤️</title>
    <link rel="stylesheet" href="style_wishes.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="title-text">Chạm vào ảnh để xem điều ước nhé ❤️</h1>
        
        <div class="wish-scatter" id="wishScatter"></div>

        <button id="btnFinal" class="btn-final" onclick="finishWishes()">
            Ngắm nhìn kỷ niệm của chúng mình ❤️
        </button>
    </div>

    <div id="notebookContainer" class="notebook-container">
        <div class="notebook" id="notebook">
            <div class="notebook-page notebook-cover">
                <img id="notebookCoverImg" src="" alt="kỷ niệm">
                <p style="margin-top:10px; font-size: 0.9rem;">Gửi Cún của anh...</p>
            </div>
            <div class="notebook-page notebook-right">
                <div id="typewriter" class="letter-text"></div>
                <button class="btn-close-notebook" onclick="closeNotebook()">Gấp lại ❤️</button>
            </div>
        </div>
    </div>

    <audio id="wishMusic" loop>
        <source src="music/wishes.mp3" type="audio/mpeg">
    </audio>
    <audio id="openSound">
        <source src="music/ting.mp3" type="audio/mpeg">
    </audio>

    <script>
        const scatter = document.getElementById('wishScatter');
        const bgMusic = document.getElementById('wishMusic');
        let openedCount = 0;

        const myPhotos = [
            "img/cun1.jpg", 
            "img/cun21.jpg", 
            "img/cun15.jpg", 
            "img/cun3.jpg", 
            "img/cun5.jpg"
        ];

        const messages = [
            "Chúc bé iu của út luôn luôn xinh đep, vui vẻ và thành công trong cuộc sống nhóoo 🌟",
            "Mong em luôn bình an và hạnh phúc bên anh ✨",
            "Chúc mọi dự định của Cún đều thành công tốt đẹp 💖",
            "Chúc tình yêu của chúng mình mãi mãi bên nhau hẹ hẹ, Út Cún Cún 👩‍❤️‍👨",
            "Chúc mừng sinh nhật em yêu nhó, hẹp bi bớt đây tu diuuu 🎂"
        ];

        function playMusic() {
            if (bgMusic && bgMusic.paused) {
                bgMusic.play().catch(e => console.log("iPhone chặn tự động phát"));
            }
        }

        document.body.addEventListener('touchstart', playMusic, { once: true });

        function spawnWishItem(index) {
            const item = document.createElement('div');
            item.className = `wish-item item-${index + 1}`;
            
            const img = document.createElement('img');
            img.src = myPhotos[index]; 

            let pressTimer;
            const startGlow = () => {
                playMusic();
                pressTimer = setTimeout(() => { item.classList.add('glowing'); }, 200);
            };

            const endGlow = () => {
                clearTimeout(pressTimer);
                item.classList.remove('glowing');
            };

            item.addEventListener('touchstart', startGlow);
            item.addEventListener('touchend', endGlow);
            item.addEventListener('mousedown', startGlow);
            item.addEventListener('mouseup', endGlow);

            item.onclick = function(e) {
                e.stopPropagation();
                this.classList.remove('glowing');
                openNotebook(messages[index], myPhotos[index]);
            };

            item.appendChild(img);
            scatter.appendChild(item);
        }

        for (let i = 0; i < 5; i++) { spawnWishItem(i); }

        let i = 0;
        let currentTxt = "";
        function typeWriter() {
            if (i < currentTxt.length) {
                document.getElementById("typewriter").innerHTML += currentTxt.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }

        function openNotebook(text, photoSrc) {
            const openSnd = document.getElementById('openSound');
            if (openSnd) openSnd.play();
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 } });

            document.getElementById('notebookCoverImg').src = photoSrc;
            document.getElementById("typewriter").innerHTML = "";
            i = 0; currentTxt = text;

            document.getElementById('notebookContainer').classList.add('show');
            setTimeout(() => {
                document.getElementById('notebook').classList.add('flip');
                typeWriter();
            }, 100);

            openedCount++;
            if(openedCount >= 3) {
                document.getElementById('btnFinal').style.display = 'block';
                setTimeout(() => { document.getElementById('btnFinal').style.opacity = '1'; }, 100);
            }
        }

        function closeNotebook() {
            document.getElementById('notebook').classList.remove('flip');
            setTimeout(() => { document.getElementById('notebookContainer').classList.remove('show'); }, 500);
        }

        // HÀM QUAN TRỌNG: Điều hướng có hướng dẫn
        function finishWishes() {
            const huongDan = confirm("Tiếp theo cún quay ngang màn hình lại để xem nhó\n\nđược thì bật âm lượng lên nghe cho chill chill :v, chạm vào màn hình để nghe nhạc và thử 'nhấn giữ' các bức ảnh bay nhé");
            
            if (huongDan) {
                window.location.href = 'gallery.html';
            }
        }
    </script>
</body>
</html>
