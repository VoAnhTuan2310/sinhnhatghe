<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Màn hình khóa tình yêu ❤️</title>
    <link rel="stylesheet" href="style_password.css">
</head>
<body>
    <div class="main-card">
        <div class="image-section"><img src="img/cun1.jpg" class="side-photo"></div>
        <div class="password-section">
            <p class="title-text">Nhập ngày sinh của bạn...</p>
            <input type="password" id="passInput" class="pass-display" readonly>
            <div class="keypad" id="keypad">
                <script>
                    for(let i=1; i<=9; i++) document.write(`<div class="key" onclick="addNumber(${i})">${i}</div>`);
                </script>
                <div class="key btn-clear" onclick="clearPass()">C</div>
                <div class="key" onclick="addNumber(0)">0</div>
                <div class="key btn-check" onclick="checkPass()">✓</div>
            </div>
        </div>
    </div>
    <script>
        let correctPass = "160306"; 
        function addNumber(n) { document.getElementById('passInput').value += n; }
        function clearPass() { document.getElementById('passInput').value = ""; }
        function checkPass() {
            if(document.getElementById('passInput').value === correctPass) window.location.href = 'wishes.html';
            else { alert("Sai ngày sinh rồi Cún iuuu!"); clearPass(); }
        }
        function addNumber(n, event) {
        const input = document.getElementById('passInput');
        if(input.value.length < 6) {
            input.value += n;
            
            // Hiệu ứng trái tim bay ra từ nút bấm
            const heart = document.createElement('div');
            heart.innerText = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = (event.clientX || window.innerWidth/2) + 'px';
            heart.style.top = (event.clientY || window.innerHeight/2) + 'px';
            heart.style.fontSize = '25px';
            heart.style.pointerEvents = 'none';
            heart.style.zIndex = '1000';
            heart.style.animation = 'flyUp 1s ease-out forwards';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
    }

function checkPass() {
    const input = document.getElementById('passInput');
    if(input.value === "160306") {
        window.location.href = 'wishes.html';
    } else {
        // Hiệu ứng rung khung nhập liệu khi sai
        const card = document.querySelector('.main-card');
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 500);
        
        alert("Sai ngày sinh rồi Cún iuuu!");
        clearPass();
    }
}

    </script>
    <style>
    @keyframes flyUp {
        0% { transform: scale(1) translateY(0); opacity: 1; }
        100% { transform: scale(1.5) translateY(-100px); opacity: 0; }
    }
</style>
</body>
</html>
