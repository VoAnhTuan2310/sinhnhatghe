<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Cún Iuuu ❤️</title>
    <link rel="stylesheet" href="style_intro.css">
</head>
<body>
    <div class="intro-container" id="introContainer">
        <button id="btnStart" class="btn-next" onclick="window.location.href='password.html'">
            Tiếp tục ❤️
        </button>
    </div>

    <script>
    const container = document.getElementById('introContainer');
    const totalPhotos = 30;
    
    // Hàm tạo ảnh bay lộn xộn (Giữ nguyên như bản trước)
    function spawnPhoto(index) {
        const img = document.createElement('img');
        img.src = `img/cun${index}.jpg`;
        img.className = 'moving-photo';
        
        // Độ cao ngẫu nhiên
        img.style.top = `${Math.random() * 75 + 5}vh`;
        
        // Tốc độ bay ngẫu nhiên (từ 15s đến 25s)
        const duration = 15 + Math.random() * 10;
        img.style.animationDuration = `${duration}s`;
        
        // Độ xoay ngẫu nhiên
        img.style.transform = `rotate(${Math.random() * 40 - 20}deg)`;
        
        // Thời gian xuất hiện ngẫu nhiên để ảnh rải rác
        img.style.animationDelay = `${Math.random() * 10}s`;

        container.appendChild(img);

        // Vòng lặp vô tận
        img.addEventListener('animationiteration', () => {
            img.style.top = `${Math.random() * 75 + 5}vh`;
        });
    }

    // Khởi tạo 30 tấm ảnh
    for (let i = 1; i <= totalPhotos; i++) {
        spawnPhoto(i);
    }

    // --- PHẦN THAY ĐỔI: ĐỢI 5 GIÂY MỚI HIỆN NÚT ---
    setTimeout(() => {
        const btn = document.getElementById('btnStart');
        btn.style.display = 'block'; // Đảm bảo nút được hiển thị
        // Thêm một chút delay nhỏ để hiệu ứng fade-in mượt mà hơn
        setTimeout(() => {
            btn.style.opacity = '1';
            btn.style.transform = 'scale(1)'; // Hiệu ứng phóng to nhẹ khi hiện
        }, 100);
    }, 5000); // 5000ms tương đương với 5 giây
</script>
</body>
</html>
