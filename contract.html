<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sổ Chứng Nhận Tình Yêu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root { --primary-red: #e60012; --border-pink: #ffb1c1; }
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: #fff5f6; font-family: 'Quicksand', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; position: fixed; width: 100%; height: 100%;
        }

        /* 1. PHONG THƯ */
        #envelope-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff5f6; display: flex; align-items: center; justify-content: center;
            z-index: 2000; transition: 1s ease-in-out;
        }
        .envelope {
            position: relative; width: 280px; height: 180px;
            background: #f39c12; border-radius: 0 0 5px 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); cursor: pointer;
        }
        .envelope::before {
            content: ''; position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 140px solid transparent; border-right: 140px solid transparent;
            border-top: 90px solid #e67e22; transform-origin: top; transition: 0.5s; z-index: 2;
        }
        .envelope.open::before { transform: rotateX(180deg); }
        .heart-seal { position: absolute; top: 70px; left: 125px; font-size: 30px; color: #e60012; z-index: 3; }

        /* 2. KHUNG GIẤY CHỨNG NHẬN */
        .outer-glow {
            background: white; width: 92vw; max-width: 380px;
            padding: 10px; border-radius: 8px;
            border: 12px solid transparent;
            border-image: url('https://img.freepik.com/free-vector/pink-floral-border-background-vector_53876-136302.jpg') 30 round;
            position: relative; box-sizing: border-box; z-index: 10;
            opacity: 0; transform: scale(0.9); transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body.active .outer-glow { opacity: 1; transform: scale(1); }

        .inner-paper {
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            border: 1px solid #ffe0e5; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            height: 78vh; position: relative;
        }

        .count-in-box {
            background: rgba(230, 0, 18, 0.05); padding: 5px 15px;
            border-radius: 15px; font-size: 0.7rem; color: var(--primary-red);
            font-weight: bold; margin-bottom: 10px; border: 1px dashed var(--border-pink);
        }

        .flower-branch {
            position: absolute; width: 90px; height: 90px;
            background-image: url('https://png.pngtree.com/png-vector/20240201/ourmid/pngtree-rose-flower-climbing-plant-vintage-illustration-png-image_11585869.png');
            background-size: contain; background-repeat: no-repeat; opacity: 0.8; z-index: 5;
        }
        .flower-left { top: -5px; left: -5px; }
        .flower-right { top: -5px; right: -5px; transform: scaleX(-1); }

        .photo-frame {
            width: 150px; height: 110px; border: 3px solid #fff;
            margin: 5px auto; overflow: hidden; border-radius: 3px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .names-box { font-size: 1.4rem; font-weight: bold; color: var(--primary-red); font-family: 'Dancing Script', cursive; margin: 5px 0; }
        .desc-text { text-align: center; font-size: 0.75rem; color: #555; line-height: 1.5; margin-bottom: 10px; padding: 0 10px; }

        /* FIX VÙNG CHỮ KÝ */
        .sig-row { width: 100%; margin-top: auto; display: flex; justify-content: space-between; border-top: 1px dashed #ffccd5; padding: 15px 0 25px 0; position: relative; }
        .sig-item { width: 45%; position: relative; }
        .sig-label { font-size: 0.65rem; color: #888; margin-bottom: 5px; font-weight: bold; }
        .ut-signature { font-family: 'Pinyon Script', cursive; font-size: 1.6rem; color: #222; border-bottom: 1.5px solid #333; height: 40px; display: flex; align-items: flex-end; padding-left: 5px; }
        
        .cun-signature-area { 
            border-bottom: 1.5px solid var(--primary-red); 
            height: 40px; 
            background: rgba(230,0,18,0.02); 
            position: relative; 
            touch-action: none; 
            z-index: 50; /* Đưa lên trên cùng để nhận cảm ứng nhó */
        }
        #cunCanvas { 
            width: 100%; 
            height: 100%; 
            display: block;
            cursor: crosshair;
        }

        .stamp {
            position: absolute; left: 50%; top: 20px; transform: translate(-50%, -50%) scale(0) rotate(-15deg);
            width: 75px; height: 75px; border: 3px double rgba(230,0,18,0.25); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: rgba(230,0,18,0.25);
            font-weight: bold; font-size: 0.65rem; text-align: center; transition: 0.6s; z-index: 1; opacity: 0;
            pointer-events: none; /* Tránh cản trở việc ký */
        }
        .stamp.show { transform: translate(-50%, -50%) scale(1) rotate(-15deg); opacity: 0.6; }

        /* 3. LÁ THƯ ĐÈ LÊN */
        #love-letter-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 245, 246, 0.96); z-index: 3000; align-items: center; justify-content: center;
            animation: slideUp 0.5s ease-out;
        }
        .letter-content {
            width: 85%; max-width: 320px; background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 143, 163, 0.2); border: 2px solid #ffccd5; position: relative;
        }

        /* 4. CÁC NÚT BẤM */
        #action-area { display: none; margin-top: 15px; width: 90%; z-index: 100; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        .btn-main { flex: 1; padding: 12px; border-radius: 25px; border: none; color: white; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="envelope-wrapper" onclick="openEnvelope()">
        <div class="envelope" id="env"><div class="heart-seal">❤️</div></div>
        <p style="position: absolute; bottom: 25%; color: #888; font-size: 0.8rem;">Chạm để mở thư từ Út nhó...</p>
    </div>

    <audio id="bgMusic" loop><source src="music/contract.mp3" type="audio/mpeg"></audio>

    <div class="outer-glow">
        <div class="inner-paper">
            <div class="flower-branch flower-left"></div>
            <div class="flower-branch flower-right"></div>
            <div class="count-in-box" id="countUp">Đang đếm ngày yêu...</div>
            <img src="img/tim.png" style="width: 50px;">
            <h1>Sổ Chứng Nhận Tình Yêu</h1>
            <div class="photo-frame"><img src="img/cun18.jpg"></div>
            <div class="names-box">Út ❤️ Cún</div>
            <div class="desc-text">Út hứa sẽ luôn ở bên, bảo vệ và yêu thương Cún mỗi ngày. Mãi bên nhau nhó! ❤️</div>
            
            <div class="sig-row">
                <div class="sig-item">
                    <div class="sig-label">Ký tên (Út):</div>
                    <div class="ut-signature">Ut</div>
                </div>
                <div class="sig-item">
                    <div class="sig-label">Ký tên (Cún):</div>
                    <div class="cun-signature-area">
                        <canvas id="cunCanvas"></canvas>
                    </div>
                </div>
                <div class="stamp" id="loveStamp">CHỨNG NHẬN<br>LOVE<br>2026</div>
            </div>
        </div>
    </div>

    <div id="action-area">
        <div class="btn-group">
            <button class="btn-main" onclick="openLetter()" style="background: #ff8fa3;">Nhắn nhủ Út ❤️</button>
            <button class="btn-main" onclick="window.location.href='final.html'" style="background: var(--primary-red);">Đi tiếp nhó ➔</button>
        </div>
    </div>

    <div id="love-letter-overlay">
        <div class="letter-content">
            <div onclick="closeLetter()" style="position: absolute; top: 10px; right: 15px; color: #ff8fa3; cursor: pointer; font-weight: bold;">✕</div>
            <h3 style="font-family: 'Dancing Script', cursive; color: var(--primary-red); text-align: center;">Thư gửi Út... ❤️</h3>
            <textarea id="cunMsg" placeholder="Cún viết lời nhắn vào đây nhó..." style="width: 100%; height: 120px; border: 1px dashed #ffccd5; border-radius: 10px; padding: 10px; font-family: 'Quicksand'; outline: none; box-sizing: border-box; resize: none;"></textarea>
            <button id="btnSend" onclick="sendFinal()" style="margin-top: 15px; background: var(--primary-red); color: white; border: none; width: 100%; padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer;">Gửi cho Út ❤️</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        function openEnvelope() {
            document.getElementById('env').classList.add('open');
            document.getElementById('bgMusic').play();
            setTimeout(() => {
                document.getElementById('envelope-wrapper').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('envelope-wrapper').style.display = 'none';
                    document.body.classList.add('active');
                    setupCanvas();
                }, 1000);
            }, 600);
        }

        // Đếm ngày yêu từ 27/05/2025
        const startDate = new Date("2025-05-27"); 
        function updateCounter() {
            const days = Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24));
            document.getElementById('countUp').innerHTML = `❤️ Chúng mình đã bên nhau ${days} ngày ❤️`;
        }
        setInterval(updateCounter, 1000); updateCounter();

        // FIX CHỮ KÝ: Tối ưu cảm ứng cho điện thoại
        const canvas = document.getElementById('cunCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false, hasSigned = false;

        function setupCanvas() {
            const rect = canvas.getBoundingClientRect();
            // Thiết lập kích thước thực cho Canvas dựa trên hiển thị
            canvas.width = rect.width; 
            canvas.height = rect.height;
            ctx.strokeStyle = "#c2185b"; 
            ctx.lineWidth = 3;
            ctx.lineJoin = "round"; 
            ctx.lineCap = "round";
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        // Sự kiện chuột & cảm ứng
        function startDraw(e) {
            e.preventDefault();
            drawing = true;
            const p = getPos(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        }

        function moveDraw(e) {
            if (!drawing) return;
            e.preventDefault();
            const p = getPos(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            hasSigned = true;
        }

        function stopDraw() {
            if (drawing && hasSigned) {
                document.getElementById('loveStamp').classList.add('show');
                document.getElementById('action-area').style.display = 'block';
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
            }
            drawing = false;
        }

        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', moveDraw);
        window.addEventListener('touchend', stopDraw);

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', moveDraw);
        window.addEventListener('mouseup', stopDraw);

        function openLetter() { document.getElementById('love-letter-overlay').style.display = 'flex'; }
        function closeLetter() { document.getElementById('love-letter-overlay').style.display = 'none'; }

        function sendFinal() {
            const msg = document.getElementById('cunMsg').value;
            const btn = document.getElementById('btnSend');
            if(msg) {
                btn.innerHTML = "Đang gửi... ❤️"; btn.disabled = true;
                fetch("https://formspree.io/f/mnjbrwdl", { 
                    method: "POST", body: JSON.stringify({ message: msg }),
                    headers: { 'Content-Type': 'application/json' }
                }).then(() => {
                    alert("Út nhận được rồi nhó! ❤️");
                    window.location.href = 'final.html';
                }).catch(() => { window.location.href = 'final.html'; });
            } else { window.location.href = 'final.html'; }
        }
    </script>
</body>
</html>
