<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kho báu của Út & Cún ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@700&family=Dancing+Script:wght@700&display=swap');
        
        body {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            background: #ffafbd; font-family: 'Quicksand', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; color: white; touch-action: none;
        }

        .header { margin-top: 4vh; text-align: center; z-index: 10; }
        .milestone-title { font-family: 'Dancing Script', cursive; font-size: 2rem; color: #fff; text-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .days-count { font-size: 1.2rem; opacity: 0.9; margin-top: 5px; }

        .album-container {
            position: relative; width: 320px; height: 420px;
            margin-top: 20px; perspective: 1000px;
        }

        .polaroid {
            position: absolute; width: 100%; height: 100%;
            background: white; padding: 12px 12px 60px 12px;
            box-sizing: border-box; border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: transform 0.5s ease, opacity 0.5s;
            cursor: grab; touch-action: none;
        }

        .polaroid img { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; }

        .caption {
            position: absolute; bottom: 15px; left: 0; width: 100%;
            text-align: center; color: #d63384;
            font-family: 'Dancing Script', cursive; font-size: 1.4rem;
        }

        .btn-final {
            position: fixed; bottom: 40px; z-index: 1000;
            background: white; color: #d63384; border: none;
            padding: 15px 45px; border-radius: 30px; font-weight: bold;
            display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="milestone-title" id="currentMilestone">Ngày bắt đầu ❤️</div>
        <div class="days-count" id="currentDate">27/05/2025</div>
    </div>

    <div class="album-container" id="album">
        </div>

    <button id="btnFinal" class="btn-final" onclick="window.location.href='final.html'">Gửi lời yêu thương ❤️</button>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // Dữ liệu 20 ảnh chia làm 5 mốc
        const data = [
            { title: "Bắt đầu yêu ❤️", date: "27/05/2025", photos: ["img/ut1.jpg", "img/ut5.jpg"] },
            { title: "Đà Nẵng lần 1 🌊", date: "17/07/2025", photos: ["img/cun30.jpg", "img/ut6.jpg", "img/cun29.jpg", "img/ut7.jpg", "img/cun35.jpg", "img/ut8.jpg", "img/ut9.jpg"] },
            { title: "Đà Nẵng lần 2 ✨", date: "15/08/2025", photos: ["img/ut10.jpg", "img/ut11.jpg", "img/ut12.jpg", "img/ut13.jpg"] },
            { title: "Kỷ niệm tại Huế 💜", date: "07/02/2026", photos: ["img/ut14.jpg", "img/ut15.jpg", "img/ut16.jpg", "img/cun3.jpg", "img/cun14.jpg", "img/cun16.jpg", "img/ut17.jpg"] },
            { title: "Sinh nhật Cún iu 🎂", date: "16/03/2026", photos: ["img/ut.jpg"] }
        ];

        const album = document.getElementById('album');
        const milestoneTitle = document.getElementById('currentMilestone');
        const dateText = document.getElementById('currentDate');
        let totalCards = 0;

        // Tạo 20 tấm ảnh Polaroid
        data.reverse().forEach((milestone) => {
            milestone.photos.reverse().forEach((photoUrl, index) => {
                const card = document.createElement('div');
                card.className = 'polaroid';
                card.innerHTML = `
                    <img src="${photoUrl}" alt="Kỷ niệm">
                    <div class="caption">${milestone.title}</div>
                `;
                card.dataset.title = milestone.title;
                card.dataset.date = milestone.date;
                
                // Hiệu ứng xoay ngẫu nhiên nhẹ cho nghệ thuật
                const randomRotate = (Math.random() * 6 - 3).toFixed(1);
                card.style.transform = `rotate(${randomRotate}deg)`;
                
                album.appendChild(card);
                totalCards++;
                initCard(card);
            });
        });

        function initCard(card) {
            let startX, startY, moveX;

            const onStart = (e) => {
                startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                card.style.transition = 'none';
            };

            const onMove = (e) => {
                if (!startX) return;
                moveX = (e.type.includes('touch') ? e.touches[0].clientX : e.clientX) - startX;
                card.style.transform = `translate(${moveX}px, 0) rotate(${moveX / 15}deg)`;
            };

            const onEnd = () => {
                if (Math.abs(moveX) > 100) {
                    const direction = moveX > 0 ? 1 : -1;
                    card.style.transition = 'transform 0.6s ease-out, opacity 0.5s';
                    card.style.transform = `translateX(${direction * 1000}px) rotate(${direction * 45}deg)`;
                    card.style.opacity = '0';
                    card.style.pointerEvents = 'none';
                    
                    totalCards--;
                    confetti({ particleCount: 25, spread: 60, origin: { y: 0.8 } });

                    // Cập nhật tiêu đề mốc tiếp theo
                    setTimeout(() => {
                        const topCard = document.querySelector('.polaroid[style*="opacity: 1"]');
                        if (topCard || album.lastElementChild) {
                            const currentTop = Array.from(document.querySelectorAll('.polaroid')).filter(c => c.style.opacity !== '0').pop();
                            if(currentTop) {
                                milestoneTitle.innerText = currentTop.dataset.title;
                                dateText.innerText = currentTop.dataset.date;
                            }
                        }
                    }, 100);

                    if (totalCards <= 0) {
                        document.getElementById('btnFinal').style.display = 'block';
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    }
                } else {
                    card.style.transition = 'transform 0.4s ease';
                    card.style.transform = `rotate(${(Math.random() * 4 - 2)}deg)`;
                }
                startX = null; moveX = 0;
            };

            card.addEventListener('touchstart', onStart);
            card.addEventListener('touchmove', onMove);
            card.addEventListener('touchend', onEnd);
            card.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
        }
    </script>
</body>
</html>
