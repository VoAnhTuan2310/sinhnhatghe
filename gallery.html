<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kỷ niệm của chúng mình ❤️</title>
    <link rel="stylesheet" href="style_intro.css">
</head>
<body>
    <div id="musicHint" onclick="startEverything()">
        <div style="font-size: 40px;">🎵</div>
        <div style="color: #d63384; font-weight: bold; margin-top: 10px;">Chạm để bắt đầu kỷ niệm ❤️</div>
    </div>

    <div class="intro-container" id="introContainer">
        <button id="btnStart" class="btn-next" style="display:none;">
            Tiếp nè :3
        </button>
    </div>

    <audio id="bgMusic" loop>
        <source src="music/intro.mp3" type="audio/mpeg">
    </audio>

    <style>
        #musicHint {
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 99999; text-align: center; 
            cursor: pointer; background: rgba(255,255,255,0.8); 
            padding: 20px; border-radius: 20px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .intro-container {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: #ffafbd;
        }

        .btn-next {
            position: fixed;
            left: 50%;
            bottom: 50px;
            transform: translateX(-50%);
            z-index: 1000;
            opacity: 0;
            transition: 0.5s;
        }
    </style>

    <script>
        const container = document.getElementById('introContainer');
        const totalPhotos = 51;
        const bgMusic = document.getElementById('bgMusic');
        let photoIndex = 1; // Biến đếm số thứ tự ảnh

        function startEverything() {
            if (bgMusic) {
                bgMusic.play().catch(e => console.log("iPhone chờ tương tác..."));
            }
            document.getElementById('musicHint').style.display = 'none';
            
            // Thay đổi ở đây: Gọi hàm tạo ảnh thưa dần thay vì vòng lặp for
            spawnPhotoSlowly();

            setTimeout(() => {
                const btn = document.getElementById('btnStart');
                btn.style.display = 'block';
                btn.onclick = () => window.location.href = 'contract.html'; 
                
                setTimeout(() => { 
                    btn.style.opacity = '1';
                }, 100);
            }, 15000);
        }

        // Hàm mới để tạo ảnh thưa ra
        function spawnPhotoSlowly() {
            if (photoIndex > totalPhotos) return; // Đã tạo hết ảnh thì dừng

            const img = document.createElement('img');
            img.src = `img/cun${photoIndex}.jpg`; 
            img.className = 'moving-photo';
            
            // Chỉnh tọa độ bay
            img.style.top = `${Math.random() * 80 + 5}vh`; 
            img.style.left = `-${Math.random() * 300 + 200}px`; 
            
            // Thời gian bay chậm rãi
            const duration = 18 + Math.random() * 10; 
            img.style.animationDuration = `${duration}s`;
            img.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;

            img.onclick = function(e) {
                e.stopPropagation();
                this.classList.toggle('zoom');
            };

            container.appendChild(img);
            photoIndex++; // Tăng số thứ tự ảnh tiếp theo

            // Cứ mỗi 1.2 giây (1200ms) mới tạo thêm 1 tấm mới
            // Bạn có thể chỉnh 1200 thành 2000 nếu muốn thưa hơn nữa
            setTimeout(spawnPhotoSlowly, 1200); 
        }
    </script>
</body>
</html>
